name: ci

# CI runs on PRs and manual dispatch only. Development branches under
# claude/** push frequently while scaffolding is in flight and aren't
# expected to be green until integration; gating on PR avoids notification
# spam. Flip the comment below once the project reaches M9 (E2E smoke).
on:
  pull_request:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: read

jobs:
  curriculum:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python -m pip install jsonschema
      - name: validate lessons against schema
        run: bash scripts/validate-curriculum.sh
      - name: build index.json
        run: bash scripts/build-curriculum-index.sh
      - name: upload index.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: curriculum-index
          path: curriculum/index.json
          if-no-files-found: error
      - name: warn if index.json is out of date in the repo
        run: |
          if [ -f curriculum/index.json.committed ] && ! diff -q curriculum/index.json curriculum/index.json.committed >/dev/null; then
            echo "::warning::curriculum/index.json drift detected; run scripts/build-curriculum-index.sh locally and commit."
          fi

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
      - uses: gradle/actions/setup-gradle@v3
      - name: sync curriculum into assets
        run: bash scripts/sync-curriculum.sh
      - name: ensure gradle wrapper jar exists
        working-directory: android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar missing; regenerating via system gradle"
            gradle wrapper --gradle-version 8.5 --distribution-type bin
          fi
      - name: assemble debug
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace
      - name: unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

  server:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: guard (server/ Dockerfile must exist)
        run: test -f server/Dockerfile
      - name: docker build
        run: docker build -t landolisp-sandbox:ci server
      - name: smoke test /v1/health
        run: |
          docker run -d --name sandbox -p 8080:8080 landolisp-sandbox:ci
          ok=0
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/v1/health; then ok=1; break; fi
            sleep 2
          done
          docker logs sandbox || true
          [ "$ok" = "1" ]
